# T-12 mitigation: All secret values are ${VAR} references only.
# Real values live in .env (git-ignored). .env.example ships safe placeholders.
# drizzle-kit push is NEVER used — migrator always runs drizzle-kit migrate.

services:
  # ─── Postgres 17 ─────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: budget
      # PC-19: password env vars forwarded to 00-roles.sh for NOBYPASSRLS role creation (T-3)
      APP_ROLE_PASSWORD: ${APP_ROLE_PASSWORD}
      WORKER_ROLE_PASSWORD: ${WORKER_ROLE_PASSWORD}
      MIGRATOR_ROLE_PASSWORD: ${MIGRATOR_ROLE_PASSWORD}
    volumes:
      # Persistent data → bind mount OUTSIDE repo (postgres chowns to uid 70:70
      # which then breaks Docker build context reads if kept inside the repo).
      # Override with POSTGRES_DATA_PATH env var; default sibling path keeps it
      # outside the build context.
      - ${POSTGRES_DATA_PATH:-../budget-data/postgres}:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      # SEC: bind to loopback only. "5432:5432" publishes on 0.0.0.0 (every host
      # interface) — on a host without an external firewall that exposes Postgres
      # to the LAN/internet, guarded only by role passwords. 127.0.0.1 keeps the
      # port reachable for local psql + CI (which connects host→localhost:5432,
      # ci.yml migration step) while removing all off-host exposure. Prod
      # api/worker/migrator reach the DB over the compose network (@db:5432),
      # never via the host, so nothing production needs this mapping.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budget"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 5s
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  # ─── Migrator (one-shot) ──────────────────────────────────────────────────────
  # D-18: runs drizzle-kit migrate (NEVER push) + post-migration.sql
  # Uses pg_advisory_lock to prevent concurrent runs (Pitfall 1).
  migrator:
    build:
      context: .
      dockerfile: apps/migrator/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL_MIGRATOR: ${DATABASE_URL_MIGRATOR}
    depends_on:
      db:
        condition: service_healthy

  # ─── API (Hono / Bun) ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL_APP: ${DATABASE_URL_APP}
      DATABASE_URL_WORKER: ${DATABASE_URL_WORKER}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BUDGET_KEK: ${BUDGET_KEK}
      APP_URL: ${APP_URL}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      # Web push (server-side web-push signing). Without these the push send
      # throws "VAPID_SUBJECT, VAPID_PUBLIC_KEY and VAPID_PRIVATE_KEY must be set".
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      # Phase 9: investments price-provider keys (on-add instant fetch). Each
      # *_API_KEYS accepts a comma-separated list for round-robin failover.
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FINNHUB_API_KEYS: ${FINNHUB_API_KEYS:-}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      TWELVE_DATA_API_KEYS: ${TWELVE_DATA_API_KEYS:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      COINGECKO_API_KEYS: ${COINGECKO_API_KEYS:-}
      METALS_DEV_API_KEY: ${METALS_DEV_API_KEY:-}
      OTEL_SERVICE_NAME: api
      # DEV-ONLY: opt in to the gated test clock (POST /test/clock). Combined with
      # the absence of NODE_ENV=production, this lets the E2E reserve golden walk
      # move the server clock May→June. Prod images/compose never set this, so the
      # endpoint 404s and serverNow() is always the real clock there.
      ALLOW_TEST_CLOCK: "1"
      # CI E2E ONLY: forwarded from .env so the e2e job can disable Better Auth's
      # rate limiter (the suite's ~800 fresh-user sign-ups across 6 viewport
      # projects otherwise get throttled by the 100/60s bucket). Defaults to empty
      # (limiter stays ENABLED) in dev/prod, where the var is unset.
      AUTH_RATE_LIMIT_DISABLED: ${AUTH_RATE_LIMIT_DISABLED:-}
    depends_on:
      migrator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    # NOTE: api intentionally NOT published to host. Public access is via
    # the web container (port 3000), which rewrites /auth/* and /api/auth/*
    # to http://api:4000 over the internal docker network.
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ─── Web (Next.js) ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Inlined into the client bundle so pushManager.subscribe has a real
        # applicationServerKey. Sourced from the (infisical) env at build time;
        # empty when unset → push stays unavailable. MUST equal the server's
        # VAPID_PUBLIC_KEY so delivered pushes validate.
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    environment:
      # NEXT_PUBLIC_* is inlined at BUILD time. For server-side fetches that must
      # resolve at runtime (RSC server actions calling http://api:4000) we set a
      # separate non-public var that stays a runtime lookup.
      NEXT_PUBLIC_API_URL: http://api:4000
      API_INTERNAL_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/en/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Worker (pg-boss background jobs) ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL_WORKER: ${DATABASE_URL_WORKER}
      # Phase 7: the hourly budgeting-reconciliation sweep runs the RESERVE_TOPUP /
      # CUSHION_BELOW_TARGET task generators inside withTenantTx(SYSTEM_USER), which
      # uses the APP pool (sets per-tenant app.tenant_ids RLS GUC). Without this var
      # the sweep throws "Missing required env var: DATABASE_URL_APP" on every tenant
      # and stale tasks never self-heal. The write-path inline hooks live in `api`;
      # this is the worker-side backstop. (worker is workerDb for its own jobs.)
      DATABASE_URL_APP: ${DATABASE_URL_APP}
      BUDGET_KEK: ${BUDGET_KEK}
      # Web push: the pg-boss notification worker signs/sends pushes via web-push.
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      # Phase 9: price-scan cadence (UTC cron) + provider keys (CSV failover).
      PRICE_SCAN_CRON: "${PRICE_SCAN_CRON:-0 * * * *}"
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FINNHUB_API_KEYS: ${FINNHUB_API_KEYS:-}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      TWELVE_DATA_API_KEYS: ${TWELVE_DATA_API_KEYS:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      COINGECKO_API_KEYS: ${COINGECKO_API_KEYS:-}
      METALS_DEV_API_KEY: ${METALS_DEV_API_KEY:-}
    depends_on:
      migrator:
        condition: service_completed_successfully
      db:
        condition: service_healthy

