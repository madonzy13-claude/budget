<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#181a20" />
    <title>Budget</title>
    <!--
      Static offline / server-down fallback (05-18).

      Served by the Serwist service worker (apps/web/sw.ts) when a navigation
      request cannot reach the origin AND there is no fresh page to show. It is a
      file under public/, so Serwist precaches it via globPublicPatterns ["**/*"]
      — a precache HIT is guaranteed offline. The previous fallback target was a
      DYNAMIC route (/<locale>/server-down) whose HTML document is never added to
      the Serwist precache (only its JS chunk is), so caches.match() missed and
      the SW served a stale, redirect-prone app/sign-in shell instead — that
      stale shell is what produced the offline redirect loop.

      Self-contained on purpose: inline CSS + inline JS, zero external assets, so
      it renders with no network and no JS bundle. DESIGN.md dark canvas
      (#181a20), single yellow accent (#fcd535), Inter type, 6px button radius —
      matching global-error.tsx and the in-app server-down card exactly.
    -->
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background-color: #181a20;
        color: #eaecef;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .card {
        width: 100%;
        max-width: 28rem;
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
        border-radius: 9999px;
        background: rgba(252, 213, 53, 0.1);
      }
      .badge svg {
        width: 32px;
        height: 32px;
        stroke: #fcd535;
      }
      h1 {
        font-size: 24px;
        line-height: 1.2;
        font-weight: 600;
        margin: 0 0 12px;
        color: #eaecef;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #848e9c;
        margin: 0 0 24px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background-color: #fcd535;
        color: #181a20;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn:disabled {
        cursor: progress;
        opacity: 0.6;
      }
      .btn svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
      }
      .btn.is-retrying svg {
        animation: spin 1s linear infinite;
      }
      .still {
        margin: 16px 0 0;
        font-size: 12px;
        color: #f6465d;
        min-height: 1em;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .btn.is-retrying svg {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" data-testid="server-down-card" role="alert">
      <span class="badge" aria-hidden="true">
        <!-- lucide server-crash -->
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 10H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2" />
          <path d="M6 14H4a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2h-2" />
          <path d="M6 6h.01" />
          <path d="M6 18h.01" />
          <path d="m13 6-4 6h6l-4 6" />
        </svg>
      </span>
      <h1 data-i18n="title">We can't reach the server</h1>
      <p data-i18n="body">
        Budget is offline for the moment. Check your connection — if everything
        looks fine on your end, our servers are taking a breather. We'll be right
        back.
      </p>
      <button type="button" class="btn" data-testid="server-down-retry-button">
        <!-- lucide refresh-cw -->
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
          <path d="M21 3v5h-5" />
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
          <path d="M8 16H3v5" />
        </svg>
        <span data-i18n="retry">Try again</span>
      </button>
      <p class="still" data-testid="server-down-still-unreachable" role="status" aria-live="polite" hidden></p>
    </main>

    <script>
      (function () {
        // Localized copy mirrors messages/{en,pl,uk}.json -> server_down.*.
        var I18N = {
          en: {
            title: "We can't reach the server",
            body:
              "Budget is offline for the moment. Check your connection — if everything looks fine on your end, our servers are taking a breather. We'll be right back.",
            retry: "Try again",
            retrying: "Checking…",
            still: "Still no answer from the server. Give it another moment.",
          },
          pl: {
            title: "Nie możemy połączyć się z serwerem",
            body:
              "Budget jest chwilowo niedostępny. Sprawdź połączenie — jeśli u Ciebie wszystko działa, nasze serwery łapią oddech. Zaraz wracamy.",
            retry: "Spróbuj ponownie",
            retrying: "Sprawdzanie…",
            still: "Serwer wciąż nie odpowiada. Daj mu jeszcze chwilę.",
          },
          uk: {
            title: "Не вдається з'єднатися із сервером",
            body:
              "Budget зараз недоступний. Перевірте з'єднання — якщо у вас усе гаразд, наші сервери відпочивають. Скоро повернемось.",
            retry: "Спробувати ще раз",
            retrying: "Перевіряємо…",
            still: "Сервер досі не відповідає. Зачекайте ще хвилину.",
          },
        };

        function pickLocale() {
          // Source order:
          //   1) window.__OFFLINE_LANG — injected by the service worker, which
          //      cannot mutate this doc's URL so it seeds globals instead;
          //   2) explicit ?lang= (direct navigation to /offline.html?lang=);
          //   3) the originating path's first segment (?next=/pl/... or the
          //      SW-injected window.__OFFLINE_NEXT);
          //   4) the browser UI language; default en.
          try {
            if (window.__OFFLINE_LANG && I18N[window.__OFFLINE_LANG])
              return window.__OFFLINE_LANG;
            var params = new URLSearchParams(location.search);
            var byParam = params.get("lang");
            if (byParam && I18N[byParam]) return byParam;
            var next = params.get("next") || window.__OFFLINE_NEXT || "";
            var seg = next.split("/")[1];
            if (seg && I18N[seg]) return seg;
          } catch (e) {}
          var nav = (navigator.language || "en").slice(0, 2).toLowerCase();
          return I18N[nav] ? nav : "en";
        }

        var locale = pickLocale();
        var t = I18N[locale];
        document.documentElement.lang = locale;
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (t[key]) el.textContent = t[key];
        });

        var btn = document.querySelector("[data-testid=server-down-retry-button]");
        var label = btn.querySelector("[data-i18n=retry]");
        var still = document.querySelector("[data-testid=server-down-still-unreachable]");
        var retrying = false;

        function safeNext() {
          // Same-origin absolute path only — guards against open-redirect via a
          // crafted ?next=. Never bounce back to an offline doc. Prefers the
          // SW-injected window.__OFFLINE_NEXT, then ?next=.
          try {
            var next =
              window.__OFFLINE_NEXT ||
              new URLSearchParams(location.search).get("next");
            if (!next) return "/" + locale;
            if (next.charAt(0) !== "/" || next.charAt(1) === "/")
              return "/" + locale;
            if (/offline\.html/.test(next)) return "/" + locale;
            return next;
          } catch (e) {
            return "/" + locale;
          }
        }

        function retry() {
          if (retrying) return;
          retrying = true;
          still.hidden = true;
          btn.disabled = true;
          btn.classList.add("is-retrying");
          label.textContent = t.retrying;

          var done = false;
          var controller = new AbortController();
          var timer = setTimeout(function () {
            controller.abort();
          }, 5000);

          // Probe the API health endpoint (proxied to the API container). On a
          // good response, hard-navigate to the page the user originally wanted
          // so middleware + RSC run again from a clean state.
          fetch("/api/health", { cache: "no-store", signal: controller.signal })
            .then(function (res) {
              done = true;
              clearTimeout(timer);
              if (res && res.ok) {
                window.location.assign(safeNext());
                return;
              }
              fail();
            })
            .catch(function () {
              if (done) return;
              clearTimeout(timer);
              fail();
            });
        }

        function fail() {
          retrying = false;
          btn.disabled = false;
          btn.classList.remove("is-retrying");
          label.textContent = t.retry;
          still.textContent = t.still;
          still.hidden = false;
        }

        btn.addEventListener("click", retry);

        // Auto-recover: the moment the browser reports it is back online, retry
        // once. Mirrors Serwist's reloadOnOnline for the static fallback doc.
        window.addEventListener("online", retry);
      })();
    </script>
  </body>
</html>
