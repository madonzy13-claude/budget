# Dev Postgres configuration — observability tuned for local development.
# Mounted read-only at /etc/postgresql/postgresql.conf in docker-compose.yml.

# Logging: capture all DDL for dev debugging
log_statement = 'ddl'
log_min_duration_statement = 200

# Performance observability
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = 'all'

# Connection settings
max_connections = 100

# Reasonable timeouts for dev
lock_timeout = '10s'
idle_in_transaction_session_timeout = '30s'
