name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate-tag:
    name: Validate tag is strict SemVer
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-SemVer tags
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Tag '$TAG' is not strict SemVer (vMAJOR.MINOR.PATCH[-PRERELEASE])"
            exit 1
          fi
          echo "Tag '$TAG' validated"

  verify-ci-green:
    name: Verify CI was green on tagged commit
    runs-on: ubuntu-latest
    needs: [validate-tag]
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check CI check-runs of tagged SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          # Combined-status API is unreachable for the default GITHUB_TOKEN on
          # free private repos. Use check-runs (Actions writes check-runs, not
          # legacy statuses). The Release workflow's own checks are filtered out
          # (they are running right now). The repo has well under 100 checks, so a
          # single page holds them all (no cross-page array merge to worry about).
          REL='^Release$|^GitHub Release$|^Build & push|^Verify CI was green|^Validate tag'
          CHECKS=$(gh api --paginate \
            "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" \
            --jq "[.check_runs[] | select(.name | test(\"${REL}\"; \"i\") | not) | {name, status, conclusion}]")
          echo "Relevant CI checks on ${SHA}:"
          echo "$CHECKS" | jq .

          # (1) CI must have ACTUALLY run — a commit with zero checks must not
          #     release (would otherwise pass vacuously).
          TOTAL=$(echo "$CHECKS" | jq 'length')
          if [[ "$TOTAL" -eq 0 ]]; then
            echo "::error::No CI checks ran on ${SHA}. Tag a commit that CI verified on main."
            exit 1
          fi

          # (2) CI must be FINISHED — no queued / in_progress checks.
          PENDING=$(echo "$CHECKS" | jq -c '[.[] | select(.status != "completed")]')
          if [[ "$PENDING" != "[]" ]]; then
            echo "::error::CI still running on ${SHA}: ${PENDING}. Wait for it to finish."
            exit 1
          fi

          # (3) Every completed check must be green (success / neutral / skipped).
          BAD=$(echo "$CHECKS" | jq -c '[.[] | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped")]')
          if [[ "$BAD" != "[]" ]]; then
            echo "::error::CI is not green on ${SHA}: ${BAD}. Refusing to release."
            exit 1
          fi
          echo "CI is fully green on ${SHA} (${TOTAL} checks) — proceeding to build & push."

  build-and-push:
    name: Build & push ${{ matrix.service }}
    needs: [verify-ci-green]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker, migrator]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/budget-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=sha,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # NEXT_PUBLIC_VAPID_PUBLIC_KEY is INLINED into the web client bundle at
          # BUILD time — it cannot be injected at runtime. Without it pushManager
          # .subscribe() has no applicationServerKey and web push silently no-ops.
          # It is the PUBLIC half of the VAPID pair (safe as a repo variable); the
          # server VAPID_PRIVATE_KEY must be its matching private half. Empty when
          # the variable is unset → the app is fully functional, push just stays off.
          # (Only the web Dockerfile declares this ARG; other services ignore it.)
          # GIT_COMMIT stamps the build id shown in the Settings footer.
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

      - name: Trivy scan (CRITICAL fails)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/budget-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # don't fail on HIGH; CRITICAL is enforced below
          ignore-unfixed: true

      - name: Fail on Trivy CRITICAL
        run: |
          if jq -e '.runs[].results[] | select(.level == "error")' trivy-${{ matrix.service }}.sarif > /dev/null; then
            echo "Trivy reported CRITICAL findings"
            exit 1
          fi

      - name: Upload Trivy SARIF (best-effort — Code Scanning requires GHAS on private repos)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/budget-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

  github-release:
    name: GitHub Release
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all SBOMs
        uses: actions/download-artifact@v4
        with:
          path: sboms
          pattern: sbom-*
          merge-multiple: true

      - name: Build release notes body
        id: body
        run: |
          {
            echo 'BODY<<EOF'
            echo "## Images"
            echo
            echo '| Service | Image |'
            echo '|---|---|'
            for s in api web worker migrator; do
              echo "| $s | \`ghcr.io/${{ github.repository_owner }}/budget-$s:${GITHUB_REF_NAME#v}\` |"
            done
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.body.outputs.BODY }}
          files: |
            sboms/sbom-*.spdx.json
