name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate-tag:
    name: Validate tag is strict SemVer
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-SemVer tags
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Tag '$TAG' is not strict SemVer (vMAJOR.MINOR.PATCH[-PRERELEASE])"
            exit 1
          fi
          echo "Tag '$TAG' validated"

  verify-ci-green:
    name: Verify CI was green on tagged commit
    runs-on: ubuntu-latest
    needs: [validate-tag]
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check CI check-runs of tagged SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${GITHUB_SHA}"
          # Combined-status API is unreachable for the default GITHUB_TOKEN on
          # free private repos. Use check-runs (Actions writes check-runs, not
          # legacy statuses) and require every COMPLETED non-Release check to
          # be success / neutral / skipped. The Release workflow is filtered out
          # because it is the workflow currently running.
          BAD=$(gh api --paginate \
            "repos/${{ github.repository }}/commits/${SHA}/check-runs?per_page=100" \
            --jq '
              [.check_runs[]
                | select(.status == "completed")
                | select(.name | test("^Release$|^GitHub Release$|^Build & push|^Verify CI was green|^Validate tag"; "i") | not)
                | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped")
                | {name, conclusion}]')
          echo "Non-green checks: $BAD"
          if [[ "$BAD" != "[]" ]]; then
            echo "CI is not green on $SHA — refusing to release"
            exit 1
          fi

  build-and-push:
    name: Build & push ${{ matrix.service }}
    needs: [verify-ci-green]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker, migrator]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/budget-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=sha,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy scan (CRITICAL fails)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/budget-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # don't fail on HIGH; CRITICAL is enforced below
          ignore-unfixed: true

      - name: Fail on Trivy CRITICAL
        run: |
          if jq -e '.runs[].results[] | select(.level == "error")' trivy-${{ matrix.service }}.sarif > /dev/null; then
            echo "Trivy reported CRITICAL findings"
            exit 1
          fi

      - name: Upload Trivy SARIF (best-effort — Code Scanning requires GHAS on private repos)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/budget-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

  github-release:
    name: GitHub Release
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all SBOMs
        uses: actions/download-artifact@v4
        with:
          path: sboms
          pattern: sbom-*
          merge-multiple: true

      - name: Build release notes body
        id: body
        run: |
          {
            echo 'BODY<<EOF'
            echo "## Images"
            echo
            echo '| Service | Image |'
            echo '|---|---|'
            for s in api web worker migrator; do
              echo "| $s | \`ghcr.io/${{ github.repository_owner }}/budget-$s:${GITHUB_REF_NAME#v}\` |"
            done
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.body.outputs.BODY }}
          files: |
            sboms/sbom-*.spdx.json
