name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  lint:
    name: Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: ESLint
        run: bunx eslint apps packages --ext .ts,.tsx --max-warnings 0
      # Prettier --check intentionally NOT enforced as a hard gate — the existing
      # codebase pre-dates a strict Prettier policy. ESLint covers semantic style.
      # A separate `chore: format whole repo` PR can land later, after which this
      # step can be re-introduced.

  typecheck:
    name: Typecheck (workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck all workspaces
        run: bun run typecheck

  depcheck:
    name: dependency-cruiser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: dependency-cruiser
        run: bunx depcruise --config .dependency-cruiser.cjs --output-type err apps packages

  grep-gates:
    name: Grep gates (PC-03, PC-04)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: ban .transaction( outside tx.ts (PC-04)
        run: bun run grep:no-direct-tx
      - name: ban appPool().connect( outside tx.ts (PC-03)
        run: bun run grep:no-pool-connect

  unit-tests:
    name: Unit tests (bun:test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: bun test (pure unit tests — no DB required)
        run: bun test packages/shared-kernel packages/crypto apps/api/test --timeout 30000
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bun
          path: coverage/
          if-no-files-found: ignore

  web-tests:
    name: Web tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Vitest (via workspace bin so happy-dom resolves)
        run: cd apps/web && bun run test

  tenant-leak-gate:
    name: Tenant leak gate (T-1, T-2, T-3, PC-08, PC-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate test .env (for compose db init scripts)
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=postgres
          APP_ROLE_PASSWORD=app_pwd
          WORKER_ROLE_PASSWORD=worker_pwd
          MIGRATOR_ROLE_PASSWORD=migrator_pwd
          DATABASE_URL_APP=postgresql://app_role:app_pwd@localhost:5432/budget
          DATABASE_URL_WORKER=postgresql://worker_role:worker_pwd@localhost:5432/budget
          DATABASE_URL_MIGRATOR=postgresql://migrator:migrator_pwd@localhost:5432/budget
          BUDGET_KEK=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BETTER_AUTH_SECRET=ci-test-secret-must-be-at-least-32-characters-long
          BETTER_AUTH_URL=http://localhost:3000
          APP_URL=http://localhost:3000
          TRUSTED_ORIGINS=http://localhost:3000
          REGION=ci
          LOG_LEVEL=info
          EOF
      - name: Run tenant-leak gate via the canonical local script
        run: bash scripts/ci/run-tenant-leak.sh

  compose-smoke:
    name: Compose smoke (prod-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate test .env from CI placeholders
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=postgres
          APP_ROLE_PASSWORD=app_pwd
          WORKER_ROLE_PASSWORD=worker_pwd
          MIGRATOR_ROLE_PASSWORD=migrator_pwd
          DATABASE_URL_APP=postgresql://app_role:app_pwd@db:5432/budget
          DATABASE_URL_WORKER=postgresql://worker_role:worker_pwd@db:5432/budget
          DATABASE_URL_MIGRATOR=postgresql://migrator:migrator_pwd@db:5432/budget
          BUDGET_KEK=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BETTER_AUTH_SECRET=ci-test-secret-must-be-at-least-32-characters-long
          BETTER_AUTH_URL=http://localhost:3000
          APP_URL=http://localhost:3000
          TRUSTED_ORIGINS=http://localhost:3000
          SMTP_HOST=stub.invalid
          SMTP_PORT=25
          SMTP_FROM=ci@example.com
          SMTP_USER=
          SMTP_PASS=
          REGION=ci
          LOG_LEVEL=info
          EOF
          # Valid-looking SMTP placeholders satisfy Zod schema; nodemailer never
          # actually connects because /health doesn't send email.
      - name: Build prod-only stack
        run: docker compose -f docker-compose.yml build
      - name: Start prod-only stack and wait for health
        id: compose_up
        run: docker compose -f docker-compose.yml up -d --wait
      - name: Diagnostic — container logs on failure
        if: failure() && steps.compose_up.outcome == 'failure'
        run: |
          echo "=== docker compose ps ==="
          docker compose -f docker-compose.yml ps -a
          for svc in db migrator api web worker; do
            echo "=== logs: $svc ==="
            docker compose -f docker-compose.yml logs --no-color "$svc" 2>&1 | tail -80
          done
      - name: Verify mailpit is NOT in this stack
        run: |
          if docker compose -f docker-compose.yml ps --services | grep -qx mailpit; then
            echo "FAIL: mailpit must not be in prod compose"
            exit 1
          fi
      - name: Curl healthchecks
        run: |
          curl -f http://localhost:3000/en/health
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans

  e2e:
    name: E2E (Playwright BDD)
    needs: [compose-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Generate test .env (with mailpit for dev override)
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=postgres
          APP_ROLE_PASSWORD=app_pwd
          WORKER_ROLE_PASSWORD=worker_pwd
          MIGRATOR_ROLE_PASSWORD=migrator_pwd
          DATABASE_URL_APP=postgresql://app_role:app_pwd@db:5432/budget
          DATABASE_URL_WORKER=postgresql://worker_role:worker_pwd@db:5432/budget
          DATABASE_URL_MIGRATOR=postgresql://migrator:migrator_pwd@db:5432/budget
          BUDGET_KEK=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BETTER_AUTH_SECRET=ci-test-secret-must-be-at-least-32-characters-long
          BETTER_AUTH_URL=http://localhost:3000
          APP_URL=http://localhost:3000
          TRUSTED_ORIGINS=http://localhost:3000
          SMTP_HOST=mailpit
          SMTP_PORT=1025
          SMTP_FROM=ci@example.com
          SMTP_USER=
          SMTP_PASS=
          REGION=ci
          LOG_LEVEL=info
          EOF
      - name: Start full dev stack (compose with override = mailpit included)
        run: docker compose up -d --wait
      - name: Run Playwright BDD
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: "1"
        run: bunx bddgen && bunx playwright test --reporter=list
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    # NOT a hard gate yet — code scanning must be enabled in repo settings
    # (private repos require an explicit toggle). See:
    #   https://github.com/madonzy13-claude/budget/settings/security_analysis
    # Once enabled, drop the continue-on-error and require this check in
    # branch-protection.sh.
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bun-audit:
    name: Bun audit (HIGH+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: bun audit (root)
        run: bun audit --audit-level=high

  dockerfile-lint:
    name: hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker, migrator]
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/${{ matrix.service }}/Dockerfile
          failure-threshold: error
