name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  lint:
    name: Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --no-save
      - name: ESLint
        run: bunx eslint apps packages --ext .ts,.tsx --max-warnings 0
      # Prettier --check intentionally NOT enforced as a hard gate — the existing
      # codebase pre-dates a strict Prettier policy. ESLint covers semantic style.
      # A separate `chore: format whole repo` PR can land later, after which this
      # step can be re-introduced.

  typecheck:
    name: Typecheck (workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --no-save
      - name: Typecheck all workspaces
        run: bun run typecheck

  depcheck:
    name: dependency-cruiser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --no-save
      - name: dependency-cruiser
        run: bunx depcruise --config .dependency-cruiser.cjs --output-type err apps packages

  grep-gates:
    name: Grep gates (PC-03, PC-04)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: ban .transaction( outside tx.ts (PC-04)
        run: bun run grep:no-direct-tx
      - name: ban appPool().connect( outside tx.ts (PC-03)
        run: bun run grep:no-pool-connect
      - name: i18n completeness (EN/PL/UK parity — I18N-01, D-17)
        run: bun run check:i18n

  unit-tests:
    name: Unit tests (bun:test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --no-save
      - name: Override bunfig coverage threshold for scoped run
        run: |
          # The scoped run only covers two pure-domain packages, so the global
          # 80% threshold (set in bunfig.toml for local make test) cannot be
          # met by definition. Override to 0 just for this CI step.
          sed -i 's/^coverageThreshold = .*/coverageThreshold = 0.0/' bunfig.toml
      - name: bun test (pure unit tests — no DB)
        # apps/api/test/routes is excluded — those are integration tests that
        # require Postgres (DATABASE_URL_APP). They run in the Tenant-leak +
        # Compose-smoke jobs which spin up postgres. Architecture / schema /
        # middleware tests under apps/api/test stay DB-free.
        run: |
          bun test \
            packages/shared-kernel \
            packages/crypto \
            apps/api/test/architecture \
            apps/api/test/middleware \
            apps/api/test/schema \
            --timeout 30000
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bun
          path: coverage/
          if-no-files-found: ignore

  web-tests:
    name: Web tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: bun install --no-save
      - name: Vitest (via workspace bin so happy-dom resolves)
        run: cd apps/web && bun run test

  tenant-leak-gate:
    name: Tenant leak gate (T-1, T-2, T-3, PC-08, PC-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --no-save
      - name: Generate test .env (drives compose init scripts)
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=postgres
          APP_ROLE_PASSWORD=app_pwd
          WORKER_ROLE_PASSWORD=worker_pwd
          MIGRATOR_ROLE_PASSWORD=migrator_pwd
          DATABASE_URL_APP=postgresql://app_role:app_pwd@localhost:5432/budget
          DATABASE_URL_WORKER=postgresql://worker_role:worker_pwd@localhost:5432/budget
          DATABASE_URL_MIGRATOR=postgresql://migrator:migrator_pwd@localhost:5432/budget
          BUDGET_KEK=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BETTER_AUTH_SECRET=ci-test-secret-must-be-at-least-32-characters-long
          BETTER_AUTH_URL=http://localhost:3000
          APP_URL=http://localhost:3000
          TRUSTED_ORIGINS=http://localhost:3000
          REGION=ci
          LOG_LEVEL=info
          EOF
      - name: Boot postgres (compose db only — runs init scripts that create roles + schemas)
        run: docker compose -f docker-compose.yml up -d --wait db
      - name: Run drizzle migrations from host (uses port-mapped localhost:5432)
        env:
          DATABASE_URL_MIGRATOR: postgresql://migrator:migrator_pwd@localhost:5432/budget
        run: bun --filter='@budget/migrator' run migrate
      - name: Apply post-migration SQL (FORCE RLS + grants)
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d budget -f apps/migrator/post-migration.sql
      - name: Override bunfig coverage threshold for scoped tenant-leak run
        run: sed -i 's/^coverageThreshold = .*/coverageThreshold = 0.0/' bunfig.toml
      - name: Run tenant-leak tests (Tests 1-5)
        env:
          DATABASE_URL_APP: postgresql://app_role:app_pwd@localhost:5432/budget
          DATABASE_URL_WORKER: postgresql://worker_role:worker_pwd@localhost:5432/budget
          DATABASE_URL_MIGRATOR: postgresql://migrator:migrator_pwd@localhost:5432/budget
        run: bun test tests/tenant-leak --timeout 30000
      - name: Diagnostic — db logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color db 2>&1 | tail -80
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans

  compose-smoke:
    name: Compose smoke (prod-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --no-save
      - name: Generate test .env from CI placeholders
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=postgres
          APP_ROLE_PASSWORD=app_pwd
          WORKER_ROLE_PASSWORD=worker_pwd
          MIGRATOR_ROLE_PASSWORD=migrator_pwd
          DATABASE_URL_APP=postgresql://app_role:app_pwd@db:5432/budget
          DATABASE_URL_WORKER=postgresql://worker_role:worker_pwd@db:5432/budget
          DATABASE_URL_MIGRATOR=postgresql://migrator:migrator_pwd@db:5432/budget
          BUDGET_KEK=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BETTER_AUTH_SECRET=ci-test-secret-must-be-at-least-32-characters-long
          BETTER_AUTH_URL=http://localhost:3000
          APP_URL=http://localhost:3000
          TRUSTED_ORIGINS=http://localhost:3000
          SMTP_HOST=stub.invalid
          SMTP_PORT=25
          SMTP_FROM=ci@example.com
          SMTP_USER=
          SMTP_PASS=
          REGION=ci
          LOG_LEVEL=info
          EOF
          # Valid-looking SMTP placeholders satisfy Zod schema; nodemailer never
          # actually connects because /health doesn't send email.
      - name: Build prod-only stack
        run: docker compose -f docker-compose.yml build
      - name: Start prod-only stack and wait for health
        id: compose_up
        run: docker compose -f docker-compose.yml up -d --wait
      - name: Diagnostic — container logs on failure
        if: failure() && steps.compose_up.outcome == 'failure'
        run: |
          echo "=== docker compose ps ==="
          docker compose -f docker-compose.yml ps -a
          for svc in db migrator api web worker; do
            echo "=== logs: $svc ==="
            docker compose -f docker-compose.yml logs --no-color "$svc" 2>&1 | tail -80
          done
      - name: Verify mailpit is NOT in this stack
        run: |
          if docker compose -f docker-compose.yml ps --services | grep -qx mailpit; then
            echo "FAIL: mailpit must not be in prod compose"
            exit 1
          fi
      - name: Curl healthchecks
        run: |
          curl -f http://localhost:3000/en/health
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans

  e2e:
    name: E2E (Playwright BDD)
    needs: [compose-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: bun install --no-save
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Generate test .env (with mailpit for dev override)
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=postgres
          APP_ROLE_PASSWORD=app_pwd
          WORKER_ROLE_PASSWORD=worker_pwd
          MIGRATOR_ROLE_PASSWORD=migrator_pwd
          DATABASE_URL_APP=postgresql://app_role:app_pwd@db:5432/budget
          DATABASE_URL_WORKER=postgresql://worker_role:worker_pwd@db:5432/budget
          DATABASE_URL_MIGRATOR=postgresql://migrator:migrator_pwd@db:5432/budget
          BUDGET_KEK=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BETTER_AUTH_SECRET=ci-test-secret-must-be-at-least-32-characters-long
          BETTER_AUTH_URL=http://localhost:3000
          APP_URL=http://localhost:3000
          TRUSTED_ORIGINS=http://localhost:3000
          SMTP_HOST=mailpit
          SMTP_PORT=1025
          SMTP_FROM=ci@example.com
          SMTP_USER=
          SMTP_PASS=
          REGION=ci
          LOG_LEVEL=info
          # The Playwright suite creates a fresh verified user per scenario across
          # all six viewport projects (hundreds of sign-up/sign-in calls from the
          # web container's single IP). Better Auth's global 100/60s limiter
          # throttles that into a multi-hour run. Disable the limiter for THIS
          # e2e job only — it stays enabled in dev/prod (and in every other CI job).
          AUTH_RATE_LIMIT_DISABLED=true
          EOF
      - name: Start full dev stack (compose with override = mailpit included)
        run: docker compose up -d --wait
      - name: Settle — wait for /sign-in to render after web healthcheck passes
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:3000/en/sign-in > /dev/null 2>&1; then
              echo "/sign-in ready after ${i}x2s"
              exit 0
            fi
            sleep 2
          done
          echo "::warning::/sign-in did not become ready in 60s; proceeding anyway"
      - name: Run Playwright BDD
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: "1"
          # Some BDD steps (e.g. task-banner seeding in common-steps.ts)
          # connect to Postgres directly from the Playwright host process.
          # The generated .env only feeds docker compose containers, not this
          # step — pass DATABASE_URL_APP explicitly. The step rewrites the
          # `@db:` compose hostname to `@localhost:` (db publishes 5432).
          DATABASE_URL_APP: postgresql://app_role:app_pwd@db:5432/budget
        # Run from apps/web so bddgen + playwright pick up
        # apps/web/playwright.config.ts — the same config `make test-e2e`
        # uses. The repo-root playwright.config.ts only sees the tests/e2e
        # tree and a single project; running it here diverged CI from local
        # iteration. apps/web config covers both feature trees (apps/web/e2e
        # + tests/e2e) and the chromium + mobile projects.
        run: cd apps/web && bunx bddgen && bunx playwright test --reporter=list
      - name: Diagnostic — api/web container logs on failure
        if: failure()
        run: |
          for svc in api web worker; do
            echo "=== logs: $svc ==="
            docker compose logs --no-color --tail=200 "$svc" 2>&1
          done
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          # apps/web config writes traces here (trace: retain-on-failure).
          path: apps/web/test-results/
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  # Semgrep replaces CodeQL on free private repos (CodeQL needs GitHub
  # Advanced Security, which is paid). Semgrep CI is free for private
  # repos and covers the same SAST class.
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --error \
            --severity=ERROR \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=dist \
            --exclude=.features-gen \
            --exclude=playwright-report

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bun-audit:
    name: Bun audit (HIGH+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --no-save
      - name: bun audit (root)
        run: bun audit --audit-level=high

  dockerfile-lint:
    name: hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker, migrator]
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/${{ matrix.service }}/Dockerfile
          failure-threshold: error
